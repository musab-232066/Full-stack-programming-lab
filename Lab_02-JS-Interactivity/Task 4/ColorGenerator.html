<!DOCTYPE html>
<html lang="en">
<head>
    <title>Color Box Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Color Box Generator</h1>

<div class="box">

    <input type="text" id="c1" placeholder="Enter color 1 (red or #ff0000)">
    <input type="text" id="c2" placeholder="Enter color 2">
    <input type="text" id="c3" placeholder="Enter color 3">

    <br><br>
    <button onclick="addColors()">Add Colors</button>
    <button onclick="clearColors()">Clear</button>

</div>

<div id="colorContainer"></div>

<h3 id="browserInfo"></h3>

<script src="script.js"></script>
</body>
</html>
